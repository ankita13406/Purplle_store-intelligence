services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://purplle:purplle@db:5432/store_intelligence
      - POS_FILE=/data/pos_transactions.csv
      - EVENTS_FILE=/data/events.jsonl
      - LOG_LEVEL=INFO
      - APP_VERSION=1.0.0
      - STALE_FEED_MINUTES=10
      - METRICS_WINDOW_HOURS=24
    volumes:
      - ./data:/data:ro
      - ./dashboard:/app/dashboard:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     purplle
      POSTGRES_PASSWORD: purplle
      POSTGRES_DB:       store_intelligence
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplle -d store_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata: